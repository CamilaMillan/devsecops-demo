name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - lab
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
  CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}

jobs:
  build-test-scan-deploy:
    name: Build, test, scan and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate branch
        run: |
          echo "Branch: $GITHUB_REF_NAME"
          if [[ "$GITHUB_REF_NAME" != "dev" && "$GITHUB_REF_NAME" != "lab" && "$GITHUB_REF_NAME" != "main" ]]; then
            echo "Branch not allowed"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: app
        run: |
          python -m pytest

      - name: Run IaC security scan with Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra
          soft_fail: true

      - name: Run filesystem security scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Configure AWS credentials
        if: github.ref_name == 'dev'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref_name == 'dev'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        if: github.ref_name == 'dev'
        working-directory: app
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Force ECS deployment
        if: github.ref_name == 'dev'
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment

      - name: Validate deployment trigger
        if: github.ref_name == 'dev'
        run: |
          echo "Deployment triggered successfully"